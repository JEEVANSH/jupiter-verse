    <a routerLink="/" class="logo-area">
      <img src="assets/images/jupiterverse-logo.png" alt="JupiterVerse" class="logo-image" />
      <div class="logo-text-group">
        <span class="logo-text">JUPITER<span class="gold-text">VERSE</span></span>
        <span class="logo-tagline">Infinite Possibilities</span>
      </div>
    </a>

    <!-- Desktop Menu -->
    <nav class="nav-links-desktop">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/services" routerLinkActive="active">Services</a>
      <!-- <a routerLink="/portfolio" routerLinkActive="active">Portfolio</a> -->
      <a routerLink="/about" routerLinkActive="active">About Us</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </nav>

    <!-- CTA Button -->
    <div class="nav-cta-desktop">
      <a routerLink="/contact" class="btn btn-accent btn-sm">Schedule a Consultation</a>
    </div>

    <!-- Mobile Menu Toggle Button -->
    <button class="mobile-toggle" (click)="toggleMobileMenu()" aria-label="Toggle Menu">
      <span class="bar" [class.active]="isMobileMenuOpen"></span>
      <span class="bar" [class.active]="isMobileMenuOpen"></span>
      <span class="bar" [class.active]="isMobileMenuOpen"></span>
    </button>
  </div>

  <!-- Mobile Menu Dropdown -->
  <div class="mobile-nav" [class.open]="isMobileMenuOpen">
    <nav class="mobile-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
        (click)="closeMobileMenu()">Home</a>
      <a routerLink="/services" routerLinkActive="active" (click)="closeMobileMenu()">Services</a>
      <!-- <a routerLink="/portfolio" routerLinkActive="active" (click)="closeMobileMenu()">Portfolio</a> -->
      <a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()">About Us</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()">Contact</a>
      <a routerLink="/contact" class="btn btn-accent mobile-cta-btn" (click)="closeMobileMenu()">Schedule
        Consultation</a>
    </nav>
  </div>
</header>
