<div class="project-card hover-lift" [class.featured]="project.isFeatured">
  <div class="project-visual">
    <!-- Generates inline decorative SVG illustrations matching the project metadata -->
    <div class="visual-placeholder">
      <!-- Pattern overlay -->
      <div class="pattern-overlay"></div>
      
      <!-- Mockup content based on project.id -->
      <div class="mockup-content" *ngIf="project.id === 'al-arabi'">
        <div class="mock-browser">
          <div class="browser-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
          <div class="browser-body text-center">
            <div class="mock-nav"></div>
            <div class="mock-hero-text">Al Arabi Careers</div>
            <div class="mock-grid">
              <div class="mock-col"></div>
              <div class="mock-col"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="mockup-content" *ngIf="project.id === 'quiz-app'">
        <div class="mock-device">
          <div class="device-body">
            <div class="score-ring">95%</div>
            <div class="mock-option correct">Angular Standalone</div>
            <div class="mock-option">React Hooks</div>
          </div>
        </div>
      </div>

      <div class="mockup-content" *ngIf="project.id === 'invoice-gen'">
        <div class="mock-invoice">
          <div class="invoice-header">
            <span>INVOICE</span>
            <span>$4,820.00</span>
          </div>
          <div class="invoice-line"></div>
          <div class="invoice-line short"></div>
          <div class="invoice-stamp">PAID</div>
        </div>
      </div>

      <div class="mockup-content" *ngIf="project.id.includes('angular-')">
        <svg viewBox="0 0 100 100" width="80" height="80" class="rotating-icon">
          <polygon points="50,10 90,25 80,75 50,90 20,75 10,25" fill="#0B1F4D" stroke="#D4A017" stroke-width="2" />
          <path d="M50,20 L80,80 L65,80 L50,45 L35,80 L20,80 Z" fill="#D4A017" />
        </svg>
      </div>

      <div class="mockup-content" *ngIf="project.id.includes('springboot-')">
        <svg viewBox="0 0 100 100" width="80" height="80" class="floating-icon">
          <rect x="20" y="20" width="60" height="60" rx="10" ry="10" fill="#1e293b" stroke="#D4A017" stroke-width="3"/>
          <path d="M30 40 L45 55 L70 30" fill="none" stroke="#D4A017" stroke-width="5" stroke-linecap="round"/>
          <text x="50" y="70" fill="#fff" font-size="10" text-anchor="middle" font-weight="bold">SPRING</text>
        </svg>
      </div>
    </div>
    <div class="category-badge">{{ project.category | uppercase }}</div>
  </div>

  <div class="project-info">
    <h3 class="project-title">{{ project.title }}</h3>
    <p class="project-desc">{{ project.description }}</p>

    <!-- Specific achievements for Al Arabi or featured apps -->
    <ul class="achievements-list" *ngIf="project.achievements && project.achievements.length > 0">
      <li *ngFor="let item of project.achievements">
        <span class="bullet-gold">&bull;</span>
        <span>{{ item }}</span>
      </li>
    </ul>

    <div class="tech-tags">
      <span class="tech-tag" *ngFor="let tech of project.technologies">{{ tech }}</span>
    </div>
  </div>
</div>
